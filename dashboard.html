<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>UptimeBot</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;cursor:none!important}
body{font-family:'JetBrains Mono',monospace;background:#030303;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:-3}
#cursor-dot,#cursor-ring{position:fixed;top:0;left:0;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;z-index:999999}
#cursor-dot{width:6px;height:6px;background:#fff;box-shadow:0 0 10px #fff}
#cursor-ring{width:34px;height:34px;border:1px solid rgba(255,255,255,0.5);transition:width .15s,height .15s}
.hovering #cursor-ring{width:50px;height:50px;background:rgba(255,255,255,0.05);border-color:#fff}
.nav{background:rgba(3,3,3,0.8);border-bottom:1px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:100;backdrop-filter:blur(15px)}
.nav-in{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px}
.nav-in .brand{font-weight:800;letter-spacing:1px;font-size:1rem;color:#fff}
.nav-links{display:flex;gap:4px}
.nav-links button{background:none;border:1px solid transparent;color:rgba(255,255,255,0.5);padding:6px 14px;border-radius:8px;cursor:none;font-size:.85rem;font-family:inherit;transition:all .3s}
.nav-links button:hover,.nav-links .active{background:rgba(255,255,255,0.08);color:#fff;border-color:rgba(255,255,255,0.15);text-shadow:0 0 15px rgba(255,255,255,0.5)}
.main{max-width:1100px;margin:0 auto;padding:32px 24px}
h1{font-size:1.5rem;margin-bottom:6px;color:#fff;letter-spacing:1px}
.sub{color:rgba(255,255,255,0.4);margin-bottom:24px;font-size:.85rem}
.sums{display:flex;gap:14px;margin-bottom:28px;flex-wrap:wrap}
.sum{background:rgba(15,15,20,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:18px 24px;flex:1;min-width:100px;text-align:center;backdrop-filter:blur(10px);transition:.3s}
.sum:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,0,0,0.5)}
.sum .num{font-size:1.8rem;font-weight:800;color:#fff}
.sum .lbl{font-size:.75rem;color:rgba(255,255,255,0.4);margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.card{background:rgba(15,15,20,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;backdrop-filter:blur(10px);transition:.3s}
.card:hover{border-color:rgba(255,255,255,0.2);transform:scale(1.01) translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.5),inset 0 0 15px rgba(255,255,255,0.03)}
.card-n{font-weight:700;margin-bottom:3px;color:#fff;letter-spacing:.5px}
.card-u{font-size:.78rem;color:rgba(255,255,255,0.4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px}
.card-m{font-size:.75rem;color:rgba(255,255,255,0.35);margin-top:5px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;letter-spacing:.5px}
.badge .dot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 8px currentColor}
.badge.up{background:rgba(87,242,135,0.12);color:#57F287}.badge.up .dot{background:#57F287}
.badge.down{background:rgba(237,66,69,0.12);color:#ED4245}.badge.down .dot{background:#ED4245}
.badge.slow{background:rgba(254,231,92,0.12);color:#FEE75C}.badge.slow .dot{background:#FEE75C}
.badge.warn{background:rgba(255,165,0,0.12);color:#FFA500}.badge.warn .dot{background:#FFA500}
table{width:100%;border-collapse:collapse;margin-top:8px}
th{text-align:left;padding:12px 10px;font-size:.72rem;color:rgba(255,255,255,0.35);border-bottom:1px solid rgba(255,255,255,0.08);text-transform:uppercase;letter-spacing:1.5px}
td{padding:12px 10px;border-bottom:1px solid rgba(255,255,255,0.05);font-size:.85rem;vertical-align:middle}
tr:hover td{background:rgba(255,255,255,0.03)}
.wrap-input{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.wrap-input input,.wrap-input select{background:rgba(15,15,20,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:.88rem;font-family:inherit;flex:1;min-width:120px;transition:.3s}
.wrap-input input:focus,.wrap-input select:focus{outline:none;border-color:rgba(255,255,255,0.3);box-shadow:0 0 15px rgba(255,255,255,0.08)}
.btn{padding:8px 18px;border:none;border-radius:8px;background:#fff;color:#030303;font-weight:700;cursor:none;font-family:inherit;font-size:.85rem;transition:.3s}
.btn:hover{box-shadow:0 0 20px rgba(255,255,255,0.4);transform:translateY(-2px)}
.btn-r{background:rgba(237,66,69,0.9);color:#fff}
.btn-r:hover{box-shadow:0 0 20px rgba(237,66,69,0.4)}
.btn-sm{padding:5px 12px;font-size:.78rem}
.hide{display:none!important}
.box{max-width:500px;margin:60px auto;background:rgba(15,15,20,0.4);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:36px;text-align:center;backdrop-filter:blur(10px)}
.box h2{margin-bottom:16px;color:#fff;font-size:1.2rem;letter-spacing:1px}
.box input{width:100%;padding:10px 14px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;background:rgba(15,15,20,0.6);color:#e2e8f0;margin-top:12px;font-family:inherit}
.msg{padding:10px 16px;border-radius:8px;margin-bottom:12px;font-size:.82rem;display:none}
.msg.ok{display:block;background:rgba(87,242,135,0.1);color:#57F287}
.msg.err{display:block;background:rgba(237,66,69,0.1);color:#ED4245}
.log-entry{padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05);font-size:.8rem;display:flex;justify-content:space-between}
.log-entry .lg-s{font-weight:700}
.log-entry a{color:#58a6ff;text-decoration:none;transition:.3s}
.log-entry a:hover{text-shadow:0 0 10px rgba(88,166,255,0.5)}
.footer{text-align:center;padding:20px;color:rgba(255,255,255,0.25);font-size:.75rem;border-top:1px solid rgba(255,255,255,0.05);margin-top:40px;letter-spacing:1px}
@media(max-width:600px){.card{flex-direction:column;align-items:stretch;gap:8px}}
</style></head>
<body>
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>
<div class="nav"><div class="nav-in">
<span class="brand">📡 UptimeBot</span>
<div class="nav-links">
<button id="sBtn" class="active" onclick="page('status')">Status</button>
<button id="lBtn" class="hide" onclick="page('logs')">Logs</button>
<button id="sBtn2" class="hide" onclick="page('settings')">Settings</button>
<button id="aBtn" class="hide" onclick="page('admin')">Admin</button>
<button id="loBtn" class="hide" onclick="logout()">Logout</button>
<button id="liBtn" onclick="page('login')">Login</button>
</div></div></div>
<main class="main" id="main"></main>
<div class="footer">UptimeBot</div>

<script>
const R='sarsvankelsion/uptimebot',W=`https://raw.githubusercontent.com/${R}/main`,A=`https://api.github.com/repos/${R}`;
let M=[],S={},Cfg={},T=sessionStorage.getItem('t')||'',L=[],logsLoaded=false;

async function loadData(){
  try{
    let u=T?A+'/contents/monitors.json?cache='+Date.now():W+'/monitors.json';
    let r=await fetch(u,T?{headers:{Authorization:'bearer '+T}}:{});
    if(T){let d=await r.json();M=JSON.parse(atob(d.content));}
    else M=await r.json();
    let s=await fetch(W+'/state.json');S=await s.json();
    if(T){
      try{
        let c=await fetch(W+'/config.json?cache='+Date.now());
        Cfg=await c.json();
      }catch(e){console.error('cfg err',e)}
    }
  }catch(e){console.error(e)}
}
async function loadLogs(){
  if(!T)return;
  try{
    L=[];let r=await fetch(A+'/actions/runs?per_page=10',{headers:{Authorization:'bearer '+T}});
    let d=await r.json();
    if(d.workflow_runs) L=d.workflow_runs.map(x=>({id:x.id,n:x.run_number,s:x.status,c:x.conclusion,t:x.created_at,w:x.name}));
    logsLoaded=true;
  }catch(e){console.error(e)}
}

function page(p){
  document.querySelectorAll('.nav-links button').forEach(b=>b.classList.remove('active'));
  ['sBtn','lBtn','sBtn2','aBtn','liBtn','loBtn'].forEach(id=>{
    let el=document.getElementById(id);
    if(id==='sBtn'&&p==='status')el.classList.add('active');
    else if(id==='lBtn'&&p==='logs')el.classList.add('active');
    else if(id==='sBtn2'&&p==='settings')el.classList.add('active');
    else if(id==='aBtn'&&p==='admin')el.classList.add('active');
  });
  if(p==='status')renderStatus();
  else if(p==='settings')renderSettings();
  else if(p==='logs')renderLogs();
  else if(p==='login')renderLogin();
  else if(p==='admin')renderAdmin();
}

function renderStatus(){
  let u=0,d=0,i=0;
  M.forEach(m=>{let s=S[m.name]?.status||'U';if(s==='UP')u++;else if(s==='DOWN')d++;else i++;});
  const ts=Date.now();
  document.getElementById('main').innerHTML=
    `<h1>System Status</h1><p class="sub">${M.length} services · Updated ${new Date().toLocaleTimeString()}</p>
    <div class="sums"><div class="sum"><div class="num" style="color:#3fb950">${u}</div><div class="lbl">Operational</div></div>
    <div class="sum"><div class="num" style="color:#f85149">${d}</div><div class="lbl">Down</div></div>
    <div class="sum"><div class="num" style="color:#d29922">${i}</div><div class="lbl">Issues</div></div></div>
    ${M.map(m=>{
      let s=S[m.name]||{},c=s.status==='UP'?'up':s.status==='DOWN'?'down':s.status==='SLOW'?'slow':'warn';
      let extra='';
      if(m.type==='ssl'&&s.daysLeft!==undefined)extra=` · 🔒 SSL: ${s.daysLeft}d`;
      else if(m.type==='ssl')extra=' · 🔒 SSL';
      else if(m.type==='keyword')extra=' · 🔑 Keyword';
      let ago=s.checkedAt?formatAgo(ts-s.checkedAt):'—';
      return `<div class="card"><div><div class="card-n">${esc(m.name)}</div><div class="card-u">${esc(m.url)}</div><div class="card-m">⏱ ${s.latency||'—'}ms · ${ago} ago${extra}</div></div><div class="badge ${c}"><span class="dot"></span>${s.status||'Waiting'}</div></div>`;
    }).join('')}
    <div style="margin-top:20px;text-align:center"><a href="https://github.com/sarsvankelsion/uptimebot/actions" target="_blank" style="color:#58a6ff;font-size:.85rem">View Workflow Runs →</a></div>`;
}
function formatAgo(ms){if(ms<60000)return Math.round(ms/1000)+'s';if(ms<3600000)return Math.floor(ms/60000)+'m';return Math.floor(ms/3600000)+'h';}

function renderLogs(){
  if(!T)return page('login');
  if(!logsLoaded)loadLogs();
  document.getElementById('main').innerHTML=
    `<h1>Workflow Logs</h1><p class="sub">Recent 10 runs</p>
    ${L.length?L.map(x=>{
      let c=x.c==='success'?'#3fb950':x.c==='failure'?'#f85149':'#d29922';
      let url=`https://github.com/sarsvankelsion/uptimebot/actions/runs/${x.id}`;
      return `<div class="log-entry"><span><a href="${url}" target="_blank" style="color:#58a6ff;text-decoration:none">#${x.n}</a> ${x.w} — <span class="lg-s" style="color:${c}">${x.c||x.s}</span></span><span style="color:#8b949e">${new Date(x.t).toLocaleString()}</span></div>`;
    }).join(''):'<p style="color:#8b949e">No logs loaded</p>'}
    <button class="btn btn-sm" style="margin-top:12px" onclick="loadLogs().then(()=>renderLogs())">Refresh</button>`;
}

function renderLogin(){
  document.getElementById('main').innerHTML=`<div class="box"><h2>Admin Login</h2><p style="font-size:.82rem;color:#8b949e">Enter your GitHub Personal Access Token with <b>repo</b> scope</p><input type="password" id="pw" placeholder="ghp_..." /><br><br><button class="btn" onclick="doLogin()">Login</button><div id="lerr" class="msg err"></div></div>`;
}
function doLogin(){
  T=document.getElementById('pw').value;
  if(T.length<10)return document.getElementById('lerr').textContent='Token too short';
  sessionStorage.setItem('t',T);
  document.getElementById('sBtn2').classList.remove('hide');
  document.getElementById('aBtn').classList.remove('hide');
  document.getElementById('lBtn').classList.remove('hide');
  document.getElementById('loBtn').classList.remove('hide');
  document.getElementById('liBtn').classList.add('hide');
  page('admin');
}

function logout(){
  T='';sessionStorage.removeItem('t');
  document.getElementById('sBtn2').classList.add('hide');
  document.getElementById('aBtn').classList.add('hide');
  document.getElementById('lBtn').classList.add('hide');
  document.getElementById('loBtn').classList.add('hide');
  document.getElementById('liBtn').classList.remove('hide');
  page('status');
}

function renderAdmin(){
  if(!T)return page('login');
  document.getElementById('main').innerHTML=
    `    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2>Admin</h2><button class="btn btn-sm" onclick="addMon()">+ Add</button></div>
    <div id="amsg" class="msg"></div>
    <table><thead><tr><th>Name</th><th>URL</th><th>Type</th><th>Status</th><th></th></tr></thead>
    <tbody>${M.map((m,i)=>{
      let s=S[m.name]?.status||'U';
      return `<tr><td>${esc(m.name)}</td><td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.url)}</td><td>${m.type}</td><td><span class="badge ${s==='UP'?'up':'down'}"><span class="dot"></span>${s}</span></td>
      <td style="display:flex;gap:5px"><button class="btn btn-sm" onclick="editMon(${i})">Edit</button><button class="btn btn-sm btn-r" onclick="delMon(${i})">Del</button></td></tr>`;
    }).join('')}</tbody></table>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #30363d">
      <button class="btn btn-sm" onclick="syncFromRepo()">🔄 Sync from Repo</button>
    </div>`;
}

function addMon(){window._editIdx=-1;document.getElementById('main').innerHTML=getFormHTML('','','http','');}
function editMon(i){
  window._editIdx=i;
  let m=M[i];
  document.getElementById('main').innerHTML=getFormHTML(m.name,m.url,m.type,m.keyword||'');
}
function syncFromRepo(){
  loadData().then(()=>{renderAdmin();document.getElementById('amsg').textContent='Synced!';document.getElementById('amsg').className='msg ok';});
}

function renderSettings(){
  if(!T)return page('login');
  document.getElementById('main').innerHTML=
    `<h1>Settings</h1><p class="sub">Discord webhook &amp; config</p>
    <div id="smsg" class="msg"></div>
    <div class="card" style="flex-direction:column;align-items:stretch;gap:10px">
      <div style="font-weight:600">Discord Webhook URL</div>
      <input id="swh" style="width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:8px;color:#e6edf3;font-size:.9rem" value="${esc(Cfg.webhookUrl||'')}" placeholder="https://discord.com/api/webhooks/..." />
      <div style="display:flex;gap:10px">
        <button class="btn btn-sm" onclick="saveSettings()">Save</button>
      </div>
      <div style="font-size:.8rem;color:#8b949e">The webhook URL is saved to <code>config.json</code> in the repo. The workflow reads it automatically.</div>
    </div>`;
}
async function saveSettings(){
  let wh=document.getElementById('swh').value.trim();
  Cfg.webhookUrl=wh;
  try{
    let r=await fetch(A+'/contents/config.json',{headers:{Authorization:'bearer '+T}});
    let d=await r.json();
    let content=btoa(unescape(encodeURIComponent(JSON.stringify(Cfg,null,2)+'\n')));
    let res=await fetch(A+'/contents/config.json',{
      method:'PUT',
      headers:{Authorization:'bearer '+T,'Content-Type':'application/json'},
      body:JSON.stringify({message:'dashboard: update config',content,sha:d.sha})
    });
    if(res.status===409){document.getElementById('smsg').textContent='Conflict, retrying...';return setTimeout(saveSettings,500);}
    if(!res.ok){let e=await res.json();throw new Error(e.message);}
    document.getElementById('smsg').textContent='Saved!';document.getElementById('smsg').className='msg ok';
  }catch(e){document.getElementById('smsg').textContent='Error: '+e.message;document.getElementById('smsg').className='msg err';}
}

let _formMsg;

function getFormHTML(n,u,t,k){
  let kw=k||'';
  return `<div class="box" style="max-width:550px"><h2>${_editIdx>=0?'Edit':'Add'} Monitor</h2>
  <div id="fmsg" class="msg"></div>
  <div class="wrap-input"><input id="fn" value="${esc(n)}" placeholder="Name (e.g. My API)" /></div>
  <div class="wrap-input"><input id="fu" value="${esc(u)}" placeholder="URL (e.g. https://...)" /></div>
  <div class="wrap-input"><select id="ft" onchange="document.getElementById('fkd').style.display=this.value==='keyword'?'':'none'"><option ${t==='http'?'selected':''}>http</option><option ${t==='keyword'?'selected':''}>keyword</option><option ${t==='ssl'?'selected':''}>ssl</option></select></div>
  <div class="wrap-input" id="fkd" style="display:${t==='keyword'?'':'none'}"><input id="fk" value="${esc(kw)}" placeholder="Keyword to find in body" /></div>
  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
    <button class="btn btn-sm" onclick="page('admin')">Cancel</button>
    <button class="btn" onclick="saveMon()">${_editIdx>=0?'Update':'Create'}</button>
  </div></div>`;
}

async function saveMon(){
  let name=document.getElementById('fn').value.trim();
  let url=document.getElementById('fu').value.trim();
  let type=document.getElementById('ft').value;
  let keyword=document.getElementById('fk')?.value||'';
  if(!name||!url)return setFormMsg('Name and URL required','err');
  let list=[...M];
  if(_editIdx>=0)list[_editIdx]={name,url,type,keyword};
  else list.push({name,url,type,keyword});
  try{
    await putMonitors(list,'update'+(_editIdx>=0?'':' add')+' monitor');
    M=list;
    _editIdx=-1;
    document.getElementById('amsg').textContent='Saved!';document.getElementById('amsg').className='msg ok';
    page('admin');
  }catch(e){setFormMsg('Error: '+e.message,'err');}
}

async function putMonitors(list,msg,retry){
  let r=await fetch(A+'/contents/monitors.json',{headers:{Authorization:'bearer '+T}});
  let d=await r.json();
  let content=btoa(unescape(encodeURIComponent(JSON.stringify(list,null,2)+'\n')));
  let res=await fetch(A+'/contents/monitors.json',{
    method:'PUT',
    headers:{Authorization:'bearer '+T,'Content-Type':'application/json'},
    body:JSON.stringify({message:'dashboard: '+msg,content,sha:d.sha})
  });
  if(res.status===409&&!retry)return putMonitors(list,msg,true);
  if(!res.ok){let e=await res.json();throw new Error(e.message||'HTTP '+res.status);}
}

async function delMon(i){
  if(!confirm('Delete "'+M[i].name+'"?'))return;
  let list=M.filter((_,j)=>j!==i);
  try{
    await putMonitors(list,'delete monitor');
    M=list;
    document.getElementById('amsg').textContent='Deleted!';document.getElementById('amsg').className='msg ok';
    page('admin');
  }catch(e){document.getElementById('amsg').textContent='Error: '+e.message;document.getElementById('amsg').className='msg err';}
}

function setFormMsg(t,c){let el=document.getElementById('fmsg');if(el){el.textContent=t;el.className='msg '+c;}}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m])}

// Init
_editIdx=-1;
if(T){
  ['sBtn2','aBtn','lBtn','loBtn'].forEach(id=>document.getElementById(id).classList.remove('hide'));
  document.getElementById('liBtn').classList.add('hide');
  loadLogs();
}
loadData().then(()=>page('status'));
setInterval(()=>{
  let active=document.querySelector('.active');
  if(active&&active.id==='sBtn')loadData().then(()=>renderStatus());
  else if(active&&active.id==='aBtn'&&_editIdx<0)loadData().then(()=>renderAdmin());
},15000);

// Custom cursor
const cDot=document.getElementById('cursor-dot'),cRing=document.getElementById('cursor-ring');
let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cDot.style.left=mx+'px';cDot.style.top=my+'px'});
document.addEventListener('mousedown',()=>{cRing.style.width='20px';cRing.style.height='20px'});
document.addEventListener('mouseup',()=>{cRing.style.width='34px';cRing.style.height='34px'});
function lerp(a,b,t){return a+(b-a)*t}
(function anim(){rx=lerp(rx,mx,.15);ry=lerp(ry,my,.15);cRing.style.left=rx+'px';cRing.style.top=ry+'px';requestAnimationFrame(anim)})();
// Hover effect
document.addEventListener('mouseover',e=>{if(e.target.closest('a,button,.card,.sum,.log-entry,.social-btn'))document.body.classList.add('hovering')});
document.addEventListener('mouseout',e=>{if(e.target.closest('a,button,.card,.sum,.log-entry,.social-btn'))document.body.classList.remove('hovering')});
</script></body></html>
