<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>UptimeBot</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.nav{background:#161b22;border-bottom:1px solid #30363d;position:sticky;top:0;z-index:100}
.nav-in{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px}
.nav-in .brand{font-weight:700}
.nav-links{display:flex;gap:6px}
.nav-links button{background:none;border:none;color:#8b949e;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:.9rem}
.nav-links button:hover,.nav-links .active{background:#1c2333;color:#e6edf3}
.main{max-width:1100px;margin:0 auto;padding:28px 20px}
h1{font-size:1.6rem;margin-bottom:6px}
.sub{color:#8b949e;margin-bottom:20px}
.sums{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.sum{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 22px;flex:1;min-width:100px;text-align:center}
.sum .num{font-size:1.6rem;font-weight:700}
.sum .lbl{font-size:.8rem;color:#8b949e;margin-top:4px}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.card-n{font-weight:600;margin-bottom:3px}
.card-u{font-size:.8rem;color:#8b949e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:400px}
.card-m{font-size:.78rem;color:#8b949e;margin-top:5px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:.8rem;font-weight:600}
.badge .dot{width:7px;height:7px;border-radius:50%}
.badge.up{background:rgba(63,185,80,0.15);color:#3fb950}.badge.up .dot{background:#3fb950}
.badge.down{background:rgba(248,81,73,0.15);color:#f85149}.badge.down .dot{background:#f85149}
.badge.slow{background:rgba(210,153,34,0.15);color:#d29922}.badge.slow .dot{background:#d29922}
.badge.warn{background:rgba(212,118,14,0.15);color:#d4760e}.badge.warn .dot{background:#d4760e}
table{width:100%;border-collapse:collapse;margin-top:8px}
th{text-align:left;padding:10px 8px;font-size:.78rem;color:#8b949e;border-bottom:1px solid #30363d;text-transform:uppercase}
td{padding:10px 8px;border-bottom:1px solid #30363d;font-size:.88rem;vertical-align:middle}
tr:hover td{background:#1c2333}
.wrap-input{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.wrap-input input,.wrap-input select{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:8px 12px;color:#e6edf3;font-size:.9rem;flex:1;min-width:120px}
.btn{padding:8px 16px;border:none;border-radius:8px;background:#58a6ff;color:#fff;font-weight:600;cursor:pointer;display:inline-block}
.btn:hover{opacity:.85}
.btn-r{background:#f85149}
.btn-sm{padding:5px 10px;font-size:.8rem}
.hide{display:none!important}
.box{max-width:500px;margin:60px auto;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:32px;text-align:center}
.box h2{margin-bottom:16px}
.box input{width:100%;padding:8px 12px;border:1px solid #30363d;border-radius:8px;background:#0d1117;color:#e6edf3;margin-top:10px}
.msg{padding:8px 14px;border-radius:8px;margin-bottom:12px;font-size:.85rem;display:none}
.msg.ok{display:block;background:rgba(63,185,80,0.15);color:#3fb950}
.msg.err{display:block;background:rgba(248,81,73,0.15);color:#f85149}
.log-entry{padding:6px 0;border-bottom:1px solid #30363d;font-size:.82rem;display:flex;justify-content:space-between}
.log-entry .lg-s{font-weight:600}
.footer{text-align:center;padding:16px;color:#8b949e;font-size:.78rem;border-top:1px solid #30363d;margin-top:30px}
@media(max-width:600px){.card{flex-direction:column;align-items:stretch;gap:8px}}
</style></head>
<body>
<div class="nav"><div class="nav-in">
<span class="brand">📡 UptimeBot</span>
<div class="nav-links">
<button id="sBtn" class="active" onclick="page('status')">Status</button>
<button id="lBtn" class="hide" onclick="page('logs')">Logs</button>
<button id="aBtn" class="hide" onclick="page('admin')">Admin</button>
<button id="loBtn" class="hide" onclick="logout()">Logout</button>
<button id="liBtn" onclick="page('login')">Login</button>
</div></div></div>
<main class="main" id="main"></main>
<div class="footer">UptimeBot</div>

<script>
const R='sarsvankelsion/uptimebot',W=`https://raw.githubusercontent.com/${R}/main`,A=`https://api.github.com/repos/${R}`;
let M=[],S={},T=sessionStorage.getItem('t')||'',L=[],logsLoaded=false;

async function loadData(){
  try{
    let r=await fetch(W+'/monitors.json');M=await r.json();
    let s=await fetch(W+'/state.json');S=await s.json();
  }catch(e){console.error(e)}
}
async function loadLogs(){
  if(!T)return;
  try{
    L=[];let r=await fetch(A+'/actions/runs?per_page=10',{headers:{Authorization:'bearer '+T}});
    let d=await r.json();
    if(d.workflow_runs) L=d.workflow_runs.map(x=>({id:x.id,n:x.run_number,s:x.status,c:x.conclusion,t:x.created_at,w:x.name}));
    logsLoaded=true;
  }catch(e){console.error(e)}
}

function page(p){
  document.querySelectorAll('.nav-links button').forEach(b=>b.classList.remove('active'));
  ['sBtn','lBtn','aBtn','liBtn','loBtn'].forEach(id=>{
    let el=document.getElementById(id);
    if(id==='sBtn'&&p==='status')el.classList.add('active');
    else if(id==='lBtn'&&p==='logs')el.classList.add('active');
    else if(id==='aBtn'&&p==='admin')el.classList.add('active');
  });
  if(p==='status')renderStatus();
  else if(p==='logs')renderLogs();
  else if(p==='login')renderLogin();
  else if(p==='admin')renderAdmin();
}

function renderStatus(){
  let u=0,d=0,i=0;
  M.forEach(m=>{let s=S[m.name]?.status||'U';if(s==='UP')u++;else if(s==='DOWN')d++;else i++;});
  document.getElementById('main').innerHTML=
    `<h1>System Status</h1><p class="sub">${M.length} services</p>
    <div class="sums"><div class="sum"><div class="num" style="color:#3fb950">${u}</div><div class="lbl">Operational</div></div>
    <div class="sum"><div class="num" style="color:#f85149">${d}</div><div class="lbl">Down</div></div>
    <div class="sum"><div class="num" style="color:#d29922">${i}</div><div class="lbl">Issues</div></div></div>
    ${M.map(m=>{
      let s=S[m.name]||{},c=s.status==='UP'?'up':s.status==='DOWN'?'down':s.status==='SLOW'?'slow':'warn';
      return `<div class="card"><div><div class="card-n">${esc(m.name)}</div><div class="card-u">${esc(m.url)}</div><div class="card-m">⏱ ${s.latency||'—'}ms · ${s.checkedAt?new Date(s.checkedAt).toLocaleString():'—'} ${m.type!=='http'?'· '+m.type:''}</div></div><div class="badge ${c}"><span class="dot"></span>${s.status||'Waiting'}</div></div>`;
    }).join('')}`;
}

function renderLogs(){
  if(!T)return page('login');
  if(!logsLoaded)loadLogs();
  document.getElementById('main').innerHTML=
    `<h1>Workflow Logs</h1><p class="sub">Recent 10 runs</p>
    ${L.length?L.map(x=>{
      let c=x.c==='success'?'#3fb950':x.c==='failure'?'#f85149':'#d29922';
      return `<div class="log-entry"><span>#${x.n} ${x.w} — <span class="lg-s" style="color:${c}">${x.c||x.s}</span></span><span style="color:#8b949e">${new Date(x.t).toLocaleString()}</span></div>`;
    }).join(''):'<p style="color:#8b949e">No logs loaded</p>'}
    <button class="btn btn-sm" style="margin-top:12px" onclick="loadLogs().then(()=>renderLogs())">Refresh</button>`;
}

function renderLogin(){
  document.getElementById('main').innerHTML=`<div class="box"><h2>Admin Login</h2><p style="font-size:.82rem;color:#8b949e">Enter your GitHub Personal Access Token with <b>repo</b> scope</p><input type="password" id="pw" placeholder="ghp_..." /><br><br><button class="btn" onclick="doLogin()">Login</button><div id="lerr" class="msg err"></div></div>`;
}
function doLogin(){
  T=document.getElementById('pw').value;
  if(T.length<10)return document.getElementById('lerr').textContent='Token too short';
  sessionStorage.setItem('t',T);
  document.getElementById('aBtn').classList.remove('hide');
  document.getElementById('lBtn').classList.remove('hide');
  document.getElementById('loBtn').classList.remove('hide');
  document.getElementById('liBtn').classList.add('hide');
  page('admin');
}

function logout(){
  T='';sessionStorage.removeItem('t');
  document.getElementById('aBtn').classList.add('hide');
  document.getElementById('lBtn').classList.add('hide');
  document.getElementById('loBtn').classList.add('hide');
  document.getElementById('liBtn').classList.remove('hide');
  page('status');
}

function renderAdmin(){
  if(!T)return page('login');
  document.getElementById('main').innerHTML=
    `    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2>Admin</h2><button class="btn btn-sm" onclick="addMon()">+ Add</button></div>
    <div id="amsg" class="msg"></div>
    <table><thead><tr><th>Name</th><th>URL</th><th>Type</th><th>Status</th><th></th></tr></thead>
    <tbody>${M.map((m,i)=>{
      let s=S[m.name]?.status||'U';
      return `<tr><td>${esc(m.name)}</td><td style="max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.url)}</td><td>${m.type}</td><td><span class="badge ${s==='UP'?'up':'down'}"><span class="dot"></span>${s}</span></td>
      <td style="display:flex;gap:5px"><button class="btn btn-sm" onclick="editMon(${i})">Edit</button><button class="btn btn-sm btn-r" onclick="delMon(${i})">Del</button></td></tr>`;
    }).join('')}</tbody></table>
    <div style="margin-top:20px;padding-top:16px;border-top:1px solid #30363d">
      <button class="btn btn-sm" onclick="syncFromRepo()">🔄 Sync from Repo</button>
    </div>`;
}

function addMon(){window._editIdx=-1;document.getElementById('main').innerHTML=getFormHTML('','','http','');}
function editMon(i){
  window._editIdx=i;
  let m=M[i];
  document.getElementById('main').innerHTML=getFormHTML(m.name,m.url,m.type,m.keyword||'');
}
function syncFromRepo(){
  loadData().then(()=>{renderAdmin();document.getElementById('amsg').textContent='Synced!';document.getElementById('amsg').className='msg ok';});
}

let _formMsg;

function getFormHTML(n,u,t,k){
  let kw=k||'';
  return `<div class="box" style="max-width:550px"><h2>${_editIdx>=0?'Edit':'Add'} Monitor</h2>
  <div id="fmsg" class="msg"></div>
  <div class="wrap-input"><input id="fn" value="${esc(n)}" placeholder="Name (e.g. My API)" /></div>
  <div class="wrap-input"><input id="fu" value="${esc(u)}" placeholder="URL (e.g. https://...)" /></div>
  <div class="wrap-input"><select id="ft" onchange="document.getElementById('fkd').style.display=this.value==='keyword'?'':'none'"><option ${t==='http'?'selected':''}>http</option><option ${t==='keyword'?'selected':''}>keyword</option><option ${t==='ssl'?'selected':''}>ssl</option></select></div>
  <div class="wrap-input" id="fkd" style="display:${t==='keyword'?'':'none'}"><input id="fk" value="${esc(kw)}" placeholder="Keyword to find in body" /></div>
  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:16px">
    <button class="btn btn-sm" onclick="page('admin')">Cancel</button>
    <button class="btn" onclick="saveMon()">${_editIdx>=0?'Update':'Create'}</button>
  </div></div>`;
}

async function saveMon(){
  let name=document.getElementById('fn').value.trim();
  let url=document.getElementById('fu').value.trim();
  let type=document.getElementById('ft').value;
  let keyword=document.getElementById('fk')?.value||'';
  if(!name||!url)return setFormMsg('Name and URL required','err');
  let list=[...M];
  if(_editIdx>=0)list[_editIdx]={name,url,type,keyword};
  else list.push({name,url,type,keyword});
  try{
    let r=await fetch(A+'/contents/monitors.json');
    let d=await r.json();
    let content=btoa(unescape(encodeURIComponent(JSON.stringify(list,null,2)+'\n')));
    let res=await fetch(A+'/contents/monitors.json',{
      method:'PUT',
      headers:{Authorization:'bearer '+T,'Content-Type':'application/json'},
      body:JSON.stringify({message:'update monitors via dashboard',content,sha:d.sha})
    });
    if(!res.ok){let e=await res.json();throw new Error(e.message||'HTTP '+res.status);}
    M=list;
    _editIdx=-1;
    document.getElementById('amsg').textContent='Saved!';document.getElementById('amsg').className='msg ok';
    page('admin');
  }catch(e){setFormMsg('Error: '+e.message,'err');}
}

async function delMon(i){
  if(!confirm('Delete "'+M[i].name+'"?'))return;
  let list=M.filter((_,j)=>j!==i);
  try{
    let r=await fetch(A+'/contents/monitors.json');
    let d=await r.json();
    let content=btoa(unescape(encodeURIComponent(JSON.stringify(list,null,2)+'\n')));
    let res=await fetch(A+'/contents/monitors.json',{
      method:'PUT',
      headers:{Authorization:'bearer '+T,'Content-Type':'application/json'},
      body:JSON.stringify({message:'delete monitor via dashboard',content,sha:d.sha})
    });
    if(!res.ok){let e=await res.json();throw new Error(e.message||'HTTP '+res.status);}
    M=list;
    document.getElementById('amsg').textContent='Deleted!';document.getElementById('amsg').className='msg ok';
    page('admin');
  }catch(e){document.getElementById('amsg').textContent='Error: '+e.message;document.getElementById('amsg').className='msg err';}
}

function setFormMsg(t,c){let el=document.getElementById('fmsg');if(el){el.textContent=t;el.className='msg '+c;}}
function esc(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m])}

// Init
_editIdx=-1;
if(T){
  ['aBtn','lBtn','loBtn'].forEach(id=>document.getElementById(id).classList.remove('hide'));
  document.getElementById('liBtn').classList.add('hide');
  loadLogs();
}
loadData().then(()=>page('status'));
setInterval(()=>loadData().then(()=>{
  let active=document.querySelector('.active');
  if(active&&active.id==='sBtn')renderStatus();
  else if(active&&active.id==='aBtn')renderAdmin();
}),15000);
</script></body></html>
