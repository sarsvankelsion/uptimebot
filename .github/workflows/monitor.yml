name: Uptime Monitor

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          git init --initial-branch=main
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin main
          git reset --hard origin/main
          git branch --set-upstream-to=origin/main main
          git config user.name "uptimebot"
          git config user.email "uptimebot@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run monitoring cycles
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MONITORS_JSON: ${{ secrets.MONITORS_JSON }}
        shell: bash
        run: |
          node scripts/monitor.js 2>&1 || echo "Script failed with exit code $?"

      - name: Commit state
        run: |
          git add state.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update state [skip ci]"
            git push origin HEAD:main
          fi

      - name: Trigger next run
        run: |
          curl -X POST \
            -H "Authorization: bearer ${{ secrets.PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"trigger"}'
