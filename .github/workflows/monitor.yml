name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          git init
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin main
          git reset --hard origin/main
          git config user.name "uptimebot"
          git config user.email "uptimebot@users.noreply.github.com"

      - name: Run monitoring cycles
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MONITORS_JSON: ${{ secrets.MONITORS_JSON }}
        run: |
          for i in $(seq 1 10); do
            echo "=== Cycle $i ==="
            node scripts/monitor.js
            [ "$i" -lt 10 ] && echo "Sleeping 25s..." && sleep 25
          done

      - name: Commit state
        run: |
          git add state.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update state [skip ci]"
            git push
          fi
