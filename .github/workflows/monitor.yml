name: Uptime Monitor

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger]

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          git config user.name "uptimebot"
          git config user.email "uptimebot@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Send trigger notification
        run: |
          WH=$(jq -r '.webhookUrl // ""' config.json)
          [ -z "$WH" ] && WH="${{ secrets.WEBHOOK_URL }}"
          [ -z "$WH" ] && echo "No webhook URL" && exit 0
          MONITORS=$(jq -r '[.[].name] | join(", ")' monitors.json)
          curl -s -X POST "$WH" \
            -H "Content-Type: application/json" \
            -d "{\"embeds\":[{\"title\":\"🔄 Monitor Started\",\"color\":3447003,\"fields\":[{\"name\":\"Monitors\",\"value\":\"$MONITORS\",\"inline\":false}],\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}]}"

      - name: Run monitoring
        run: |
          export WEBHOOK_URL=$(jq -r '.webhookUrl // ""' config.json)
          [ -z "$WEBHOOK_URL" ] && export WEBHOOK_URL="${{ secrets.WEBHOOK_URL }}"
          node scripts/monitor.js 2>&1 || echo "Script failed with exit code $?"

      - name: Commit state
        run: |
          git add state.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update state [skip ci]"
            git pull --rebase
            git push
          fi

      - name: Clean old workflow runs
        run: |
          RUNS=$(curl -s -H "Authorization: bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs?per_page=100" | \
            jq -r '.workflow_runs[] | select(.status == "completed") | select(.created_at < (now - 86400 | strftime("%Y-%m-%dT%H:%M:%SZ"))) | .id')
          for id in $RUNS; do
            echo "Deleting run $id"
            curl -s -X DELETE \
              -H "Authorization: bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/runs/$id"
          done

      - name: Trigger next run
        run: |
          curl -s -X POST \
            -H "Authorization: bearer ${{ secrets.PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d '{"event_type":"trigger"}'
