name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run monitoring cycles
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MONITORS_JSON: ${{ secrets.MONITORS_JSON }}
        run: |
          for i in $(seq 1 10); do
            echo "=== Cycle $i ==="
            node scripts/monitor.js
            [ "$i" -lt 10 ] && echo "Sleeping 25s..." && sleep 25
          done

      - name: Commit state
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}
          git config user.name "uptimebot"
          git config user.email "uptimebot@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "update state [skip ci]"
            git push
          fi
