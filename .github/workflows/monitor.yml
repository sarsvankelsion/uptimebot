name: Uptime Monitor

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run monitoring cycles
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MONITORS_JSON: ${{ secrets.MONITORS_JSON }}
        run: |
          for i in $(seq 1 10); do
            echo "=== Cycle $i ==="
            node scripts/monitor.js
            [ "$i" -lt 10 ] && echo "Sleeping 25s..." && sleep 25
          done

      - name: Commit state
        run: |
          git config user.name "uptimebot"
          git config user.email "uptimebot@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "update state [skip ci]"
          git push
