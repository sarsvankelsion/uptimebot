name: Uptime Monitor

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - run: |
          git init --initial-branch=main
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git fetch origin main
          git reset --hard origin/main
          git branch --set-upstream-to=origin/main main
          git config user.name "uptimebot"
          git config user.email "uptimebot@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run monitoring cycles
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          MONITORS_JSON: ${{ secrets.MONITORS_JSON }}
        shell: bash
        run: |
          echo "Starting..."
          pwd
          ls -la
          echo "Node version:"
          node --version
          node scripts/monitor.js 2>&1 || echo "Script failed with exit code $?"
          echo "All cycles done"

      - name: Commit state
        run: |
          git add state.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "update state"
            git push origin HEAD:main
          fi
